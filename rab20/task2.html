<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Задание 2:Калькулятор суммы</title>
</head>
<body>
    <input type="number" id="num1" placeholder="Первое число">
    <input type="number" id="num2" placeholder="Второе число">
    <button id="calcBtn">Сложить</button>
    <p id="sumResult"></p>
    <script>
        let input1 = document.querySelector("#num1");
        let input2 = document.querySelector("#num2");
        let calcBtn = document.querySelector("#calcBtn");
        let sumResult = document.querySelector("#sumResult");
        calcBtn.onclick = function() {
            let a = Number(input1.value);
            let b = Number(input2.value);
            let sum = a + b;
            sumResult.textContent = "Сумма = " + sum;
        };
    </script>
</body>
</html>
