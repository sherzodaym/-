<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Задание 4: (доп) Случайный фон</title>
</head>
<body>
    <button id="randomBgBtn">Случайный фон</button>
    <script>
        let btn = document.querySelector("#randomBgBtn");
        btn.onclick = function() {
            let r = Math.floor(Math.random() * 256);
            let g = Math.floor(Math.random() * 256);
            let b = Math.floor(Math.random() * 256);
            document.body.style.backgroundColor = "rgb(" + r + "," + g + "," + b + ")";
        };
    </script>
</body>
</html>
